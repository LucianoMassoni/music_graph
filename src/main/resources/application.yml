spring:
  application:
    name: music_graph
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_ID}
            client-secret: ${GOOGLE_SECRET}
            scope:
              - profile
              - email

lastfm:
  api-key: ${LAST_FM_API_KEY}

graph:
  tag-weight: 10